<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - Shop List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="report-header">
            <h1>Report</h1>
            <nav class="report-nav">
                <a href="index2.html" class="nav-link">Shopping List</a>
                <a href="login.html" class="nav-link">Login</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </header>
        
        <div class="section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="start-date">Start Date</label>
                    <div class="date-picker">
                        <select id="start-period" class="period-select">
                            <option value="month">This Month</option>
                            <option value="week">This Week</option>
                            <option value="day">Today</option>
                            <option value="year">This Year</option>
                            <option value="custom">Custom Range</option>
                        </select>
                        <input type="text" id="start-date" class="date-input" placeholder="YYYY-MM-DD">
                    </div>
                </div>
                <div class="filter-group">
                    <label for="end-date">End Date</label>
                    <div class="date-picker">
                        <select id="end-period" class="period-select">
                            <option value="month">This Month</option>
                            <option value="week" selected>Last 7 Days</option>
                            <option value="day">Last 30 Days</option>
                            <option value="year">This Year</option>
                            <option value="custom">Custom Range</option>
                        </select>
                        <input type="text" id="end-date" class="date-input" placeholder="YYYY-MM-DD">
                    </div>
                </div>
                <button class="generate-btn" onclick="generateReport()">Generate Report</button>
            </div>
        </div>

        <div class="table-container">
            <table id="report-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Date Added</th>
                        <th>Bought Date</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Bought By</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="report-list"></tbody>
            </table>
        </div>
        
        <div class="total-section">
            <div class="total-label">Total Amount</div>
            <div class="total-amount" id="report-total">AZN 0.00</div>
        </div>

        <div class="buyer-summary">
            <h2>Buyer Summary</h2>
            <div class="buyer-items" id="buyer-summary"></div>
        </div>
        
        <div style="text-align: center;">
            <a href="index2.html" class="back-btn">Back to Home</a>
        </div>
    </div>
    
    <script src="darkMode.js"></script>
    <script src="utils.js"></script>
    <script src="report.js"></script>
</body>
</html>
