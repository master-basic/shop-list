<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - Shop List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="report-header">
            <h1>Report</h1>
            <nav class="report-nav">
                <a href="index2.html" class="nav-link">Shopping List</a>
                <a href="login.html" class="nav-link">Login</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </header>
        
        <div class="section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="start-date">Start Date</label>
                    <div class="date-picker">
                        <select id="start-period" class="period-select">
                            <option value="month">This Month</option>
                            <option value="week">This Week</option>
                            <option value="day">Today</option>
                            <option value="year">This Year</option>
                            <option value="custom">Custom Range</option>
                        </select>
                        <input type="text" id="start-date" class="date-input" placeholder="YYYY-MM-DD">
                    </div>
                </div>
                <div class="filter-group">
                    <label for="end-date">End Date</label>
                    <div class="date-picker">
                        <select id="end-period" class="period-select">
                            <option value="month">This Month</option>
                            <option value="week" selected>Last 7 Days</option>
                            <option value="day">Last 30 Days</option>
                            <option value="year">This Year</option>
                            <option value="custom">Custom Range</option>
                        </select>
                        <input type="text" id="end-date" class="date-input" placeholder="YYYY-MM-DD">
                    </div>
                </div>
                <button class="generate-btn" onclick="generateReport()">Generate Report</button>
            </div>
        </div>

        <div class="table-container">
            <table id="report-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Date Added</th>
                        <th>Bought Date</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Bought By</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="report-list"></tbody>
            </table>
        </div>
        
        <div class="total-section">
            <div class="total-label">Total Amount</div>
            <div class="total-amount" id="report-total">AZN 0.00</div>
        </div>

        <div class="buyer-summary">
            <h2>Buyer Summary</h2>
            <div class="buyer-items" id="buyer-summary"></div>
        </div>
        
        <div style="text-align: center;">
            <a href="index2.html" class="back-btn">Back to Home</a>
        </div>
        <button class="theme-toggle fixed" onclick="toggleTheme()" title="Toggle theme">
            <svg class="theme-icon" viewBox="0 0 24 24" width="20" height="20">
                <path class="sun" d="M12 3v1m0 16v1m-9-9H2m20 0h-1M5.64 5.64l.71.71m12.02 12.02l.71.71M4.23 18.36l.71-.71m12.02-12.02l.71-.71M12 6a6 6 0 100 12 6 6 0 000-12z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path class="moon" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>
    
    <div class="toast-container" id="toast-container"></div>
    
    <script src="darkMode.js"></script>
    <script src="utils.js"></script>
    <script src="report.js"></script>
</body>
</html>
