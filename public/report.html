<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - Shop List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="page-header">Report</h1>
        
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="start-date">Start Date:</label>
                    <input type="date" id="start-date">
                </div>
                <div class="filter-group">
                    <label for="end-date">End Date:</label>
                    <input type="date" id="end-date">
                </div>
                <button class="generate-btn" onclick="generateReport()">Generate Report</button>
            </div>
        </div>

        <table id="report-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Date Added</th>
                    <th>Bought Date</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Bought By</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="report-list"></tbody>
        </table>
        
        <div class="total-section">
            <div class="total-label">Total Amount:</div>
            <div class="total-amount" id="report-total">AZN 0.00</div>
        </div>

        <div class="buyer-summary">
            <h2>Buyer Summary</h2>
            <div class="buyer-items" id="buyer-summary"></div>
        </div>
        
        <div style="text-align: center;">
            <a href="index2.html" class="back-btn">Back to Home</a>
        </div>
    </div>
    
    <script src="darkMode.js"></script>
    <script src="report.js"></script>
</body>
</html>
