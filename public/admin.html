<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Shop List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <h1>Admin Panel</h1>
            <nav class="admin-nav">
                <a href="index2.html" class="nav-link">Shopping List</a>
                <a href="report.html" class="nav-link">Report</a>
                <a href="login.html" class="nav-link">Login</a>
            </nav>
        </header>
        
        <div class="create-user-section">
            <h2>Create New User</h2>
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="new-username" placeholder="New Username">
                </div>
                <div class="form-group">
                    <input type="password" id="new-password" placeholder="New Password">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                    <label for="new-isAdmin">Admin</label>
                    <input type="checkbox" id="new-isAdmin">
                </div>
                <button class="primary-btn" onclick="createUser()">Create User</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Is Admin</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <tr>
                        <td colspan="3" class="no-data">No users found</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div style="text-align: center;">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <button class="theme-toggle fixed" onclick="toggleTheme()" title="Toggle theme"></button>
    </div>
    
    <script src="darkMode.js"></script>
    <script src="utils.js"></script>
    <script src="admin.js"></script>
</body>
</html>
