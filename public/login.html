<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shop List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Login</h1>
            <p>Welcome back! Please enter your details.</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="primary-btn">Login</button>
        </form>
        <div class="admin-login-section" id="admin-login-form">
            <h3>Admin Login</h3>
            <div class="admin-login-form">
                <div class="form-group">
                    <label for="admin-username">Username</label>
                    <input type="text" id="admin-username" placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" placeholder="Enter admin password">
                </div>
                <button class="admin-button" onclick="adminLogin()">Admin Login</button>
            </div>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <a href="index2.html" class="back-btn" style="width:100%;text-align:center;">Back to Shopping List</a>
        </div>
    </div>
    <button class="theme-toggle fixed" onclick="toggleTheme()" title="Toggle theme">
        <svg class="theme-icon" viewBox="0 0 24 24" width="20" height="20">
            <path class="sun" d="M12 3v1m0 16v1m-9-9H2m20 0h-1M5.64 5.64l.71.71m12.02 12.02l.71.71M4.23 18.36l.71-.71m12.02-12.02l.71-.71M12 6a6 6 0 100 12 6 6 0 000-12z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path class="moon" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>
    <script src="darkMode.js"></script>
    <script src="utils.js"></script>
    <script src="login.js"></script>
</body>
</html>
