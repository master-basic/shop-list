<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List - ShopList</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>Shopping List</h1>
                <h2 id="month-name"></h2>
            </div>
            <nav class="header-nav">
                <a href="login.html" class="nav-link">Login</a>
                <a href="report.html" class="nav-link">Report</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
            <div class="header-right">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <svg class="theme-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path class="sun" d="M12 3v1m0 16v1m-9-9H2m20 0h-1M5.64 5.64l.71.71m12.02 12.02l.71.71M4.23 18.36l.71-.71m12.02-12.02l.71-.71M12 6a6 6 0 100 12 6 6 0 000-12z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path class="moon" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <section class="section add-item-section">
            <h3>Add New Item</h3>
            <div class="input-container">
                <div class="input-group">
                    <label for="item-name">Item Name</label>
                    <div class="autocomplete">
                        <input type="text" id="item-name" placeholder="e.g., Milk" oninput="autocomplete()">
                        <div id="autocomplete-list"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label for="item-category">Category</label>
                    <select id="item-category">
                        <option value="">All Categories</option>
                        <option value="Groceries">Groceries</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Meat">Meat</option>
                        <option value="Produce">Produce</option>
                        <option value="Bakery">Bakery</option>
                        <option value="Household">Household</option>
                        <option value="Personal Care">Personal Care</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="item-price">Price (AZN)</label>
                    <input type="number" id="item-price" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="input-group">
                    <label for="item-quantity">Quantity</label>
                    <input type="number" id="item-quantity" placeholder="1" step="1" min="1" value="1">
                </div>
                <button class="button" onclick="addItem()">Add Item</button>
            </div>
        </section>

        <div class="filter-section">
            <div class="category-filter" id="category-filter">
                <span class="category-chip active" data-category="">All Items</span>
                <span class="category-chip" data-category="Groceries">Groceries</span>
                <span class="category-chip" data-category="Dairy">Dairy</span>
                <span class="category-chip" data-category="Meat">Meat</span>
                <span class="category-chip" data-category="Produce">Produce</span>
                <span class="category-chip" data-category="Bakery">Bakery</span>
                <span class="category-chip" data-category="Household">Household</span>
                <span class="category-chip" data-category="Personal Care">Personal Care</span>
            </div>
            <div class="filter-buttons">
                <button class="button button-secondary" data-filter="bought" onclick="showFilteredItems('bought')">Bought</button>
                <button class="button button-secondary" data-filter="not-bought" onclick="showFilteredItems('not-bought')">Not Bought</button>
                <button class="button button-secondary" data-filter="archived" onclick="showFilteredItems('archived')">Archived</button>
                <button class="button button-secondary" onclick="exportCSV()">Export CSV</button>
            </div>
        </div>

        <div class="bulk-bar" id="bulk-bar" style="display:none">
            <span class="bulk-label" id="bulk-label">0 selected</span>
            <div class="bulk-actions">
                <button class="button button-secondary" onclick="bulkBought()">Mark Bought</button>
                <button class="button button-secondary" onclick="bulkArchive()">Archive</button>
                <button class="button button-secondary delete-button" onclick="bulkDelete()">Delete</button>
                <button class="button button-secondary" onclick="clearSelection()">Clear</button>
            </div>
        </div>

        <div class="table-container">
            <table id="shopping-table">
                <thead>
                    <tr>
                        <th class="select-col"><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"></th>
                        <th class="sortable" data-sort="name">Item</th>
                        <th class="sortable" data-sort="date">Date</th>
                        <th class="sortable" data-sort="bought_date">Bought Date</th>
                        <th class="sortable" data-sort="category">Category</th>
                        <th class="sortable" data-sort="price">Price</th>
                        <th class="sortable" data-sort="quantity">Qty</th>
                        <th class="sortable" data-sort="total">Total</th>
                        <th class="sortable" data-sort="bought_by">Bought By</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="shopping-list"></tbody>
            </table>
        </div>

        <div class="total-section">
            <span>Total Items: <strong id="total-items">0</strong></span>
            <span>Total Amount: <strong id="total-amount">AZN 0.00</strong></span>
            <span>Purchased: <strong id="purchased-count">0</strong></span>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Edit Item</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="script.js"></script>
    <script src="editItems.js"></script>
    <script src="autocomplete.js"></script>
    <script src="darkMode.js"></script>
</body>
</html>
