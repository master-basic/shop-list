services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shopping_db
      MYSQL_USER: shop
      MYSQL_PASSWORD: shop123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: shop
      DB_PASSWORD: shop123
      DB_NAME: shopping_db
      JWT_SECRET: change-this-to-a-random-secret
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
